<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SellerPulse Lite</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <p><a href="index.html" style="color:#9eb0ea">← Back to landing</a></p>
        <h1>SellerPulse Lite</h1>
        <p>Turn listing stats into clear weekly actions.</p>
      </header>

      <section class="card grid">
        <label>Listing views <input id="views" type="number" min="0" value="500" /></label>
        <label>Orders <input id="orders" type="number" min="0" value="15" /></label>
        <label>Revenue ($) <input id="revenue" type="number" min="0" step="0.01" value="420" /></label>
        <label>Ad spend ($) <input id="adSpend" type="number" min="0" step="0.01" value="80" /></label>
        <label>Favorites <input id="favorites" type="number" min="0" value="40" /></label>
        <label>Orders with 2+ items <input id="multiOrders" type="number" min="0" value="3" /></label>
      </section>

      <section class="card tools">
        <h2>Quick Import / Export</h2>
        <p class="muted">
          CSV headers: <code>views,orders,revenue,adSpend,favorites,multiOrders</code>
        </p>
        <div class="actions">
          <input id="csvFile" type="file" accept=".csv,text/csv" />
          <button id="loadCsvBtn">Load CSV Row</button>
          <button id="downloadCsvTemplateBtn">CSV Template</button>
        </div>
      </section>

      <section class="actions">
        <button id="analyzeBtn">Analyze</button>
        <button id="downloadPlanBtn">Download Plan (.txt)</button>
      </section>

      <section class="card" id="results" hidden>
        <h2>KPI Snapshot</h2>
        <div class="kpis" id="kpiGrid"></div>
        <h3>Health Score: <span id="score"></span>/100</h3>
      </section>

      <section class="card" id="recommendations" hidden>
        <h2>Weekly Action Plan</h2>
        <ol id="actionList"></ol>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
